name: PR Automation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate project submission
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNum = context.payload.pull_request.number;

            const { data: files } = await github.rest.pulls.listFiles({ owner, repo, pull_number: prNum });
            const totalFiles = files.length;

            const normalizedFiles = files.map(f => ({
              ...f,
              filenameLower: f.filename.toLowerCase(),
              statusLower: (f.status || 'added').toLowerCase(),
            }));

            const rootJsonModified    = files.some(f => f.filename === 'project.json');
            const changedOutsideProjects = files.some(f => !f.filename.startsWith('Projects/'));
            const tooManyFiles        = totalFiles > 6;

            // Collect unique top-level project directories touched
            const projectDirs = new Set();
            for (const f of normalizedFiles) {
              if (f.filename.startsWith('Projects/')) {
                const parts = f.filename.split('/');
                if (parts.length >= 2) projectDirs.add(parts.slice(0, 2).join('/'));
              }
            }

            // ── Validation checks ──────────────────────────────────────────

            if (rootJsonModified || changedOutsideProjects) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNum,
                body: [
                  '## ❌ PR Validation Failed',
                  '',
                  'Changes must be **limited to a single new project folder** under `Projects/`.',
                  'Please do not modify the root `project.json` or any files outside your new project folder.',
                ].join('\n'),
              });
              return;
            }

            if (tooManyFiles) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNum,
                body: [
                  '## ❌ PR Validation Failed',
                  '',
                  `Your PR touches **${totalFiles} files** — the limit for a single project submission is **6 files**.`,
                  'Please remove any unrelated changes.',
                ].join('\n'),
              });
              return;
            }

            if (projectDirs.size !== 1) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNum,
                body: [
                  '## ❌ PR Validation Failed',
                  '',
                  'Please ensure **all changes are inside exactly one** new project folder under `Projects/`.',
                ].join('\n'),
              });
              return;
            }

            const [projectDir] = [...projectDirs];
            const hasReadme     = normalizedFiles.some(f => f.filenameLower === `${projectDir.toLowerCase()}/readme.md`);
            const hasProjectJson = normalizedFiles.some(f => f.filenameLower === `${projectDir.toLowerCase()}/project.json`);
            const hasModified   = normalizedFiles.some(
              f => f.filenameLower.startsWith(`${projectDir.toLowerCase()}/`) && f.statusLower !== 'added'
            );

            if (!hasReadme || !hasProjectJson) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNum,
                body: [
                  '## ❌ PR Validation Failed',
                  '',
                  'Your project folder must include **both** of the following files:',
                  '- `README.md` — project description and instructions',
                  '- `project.json` — project metadata (title, author, tags, etc.)',
                ].join('\n'),
              });
              return;
            }

            if (hasModified) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNum,
                body: [
                  '## ❌ PR Validation Failed',
                  '',
                  'Existing files may not be modified. All changes in your PR must be **new files** inside your new project folder only.',
                ].join('\n'),
              });
              return;
            }

            // ── All checks passed ──────────────────────────────────────────

            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNum,
              labels: ['nsoc26'],
            }).catch(() => {});

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: [
                '## ✅ Checks Passed!',
                '',
                `Great work, **@${context.payload.pull_request.user.login}**! 🎉`,
                '',
                'Your project submission passed all validation checks and will be reviewed for merging.',
                '',
                '> A thumbnail will be auto-generated for your project once this PR is merged.',
              ].join('\n'),
            });
