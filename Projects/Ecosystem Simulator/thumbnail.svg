<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060e" />
      <stop offset="100%" stop-color="#0b1022" />
    </linearGradient>

    <!-- Species Colors -->
    <linearGradient id="prodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="herbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#00b2ff" />
    </linearGradient>
    <linearGradient id="predGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b8b" />
      <stop offset="100%" stop-color="#ff2a5f" />
    </linearGradient>

    <!-- Glowing filter -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />

  <!-- Grid lines -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="100" x2="800" y2="100" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="150" x2="800" y2="150" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="200" x2="800" y2="200" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="250" x2="800" y2="250" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="300" x2="800" y2="300" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="350" x2="800" y2="350" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="400" x2="800" y2="400" stroke="#00e5ff" stroke-width="1" />
    <line x1="0" y1="450" x2="800" y2="450" stroke="#00e5ff" stroke-width="1" />
    
    <line x1="100" y1="0" x2="100" y2="500" stroke="#00e5ff" stroke-width="1" />
    <line x1="200" y1="0" x2="200" y2="500" stroke="#00e5ff" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="500" stroke="#00e5ff" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="500" stroke="#00e5ff" stroke-width="1" />
    <line x1="500" y1="0" x2="500" y2="500" stroke="#00e5ff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="500" stroke="#00e5ff" stroke-width="1" />
    <line x1="700" y1="0" x2="700" y2="500" stroke="#00e5ff" stroke-width="1" />
  </g>

  <!-- Radiant glow elements -->
  <circle cx="250" cy="250" r="140" fill="#10b981" opacity="0.04" filter="url(#glow)" />
  <circle cx="580" cy="270" r="100" fill="#00b2ff" opacity="0.03" filter="url(#glow)" />

  <!-- Ecosystem Arena Sandbox (Left side) -->
  <g transform="translate(80, 70)">
    <!-- Arena Border Envelope -->
    <rect x="0" y="0" width="320" height="340" rx="12" fill="rgba(10, 15, 28, 0.4)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />
    
    <!-- Ambient Sunlight Ray -->
    <path d="M 0 0 L 320 0 L 220 340 L 0 340 Z" fill="rgba(255, 255, 255, 0.01)" />
    
    <!-- Nutrient Glowing Zones -->
    <circle cx="100" cy="220" r="40" fill="rgba(234, 179, 8, 0.12)" filter="url(#glow)" />
    <circle cx="210" cy="110" r="30" fill="rgba(234, 179, 8, 0.08)" filter="url(#glow)" />

    <!-- Plants (Producers) -->
    <circle cx="80" cy="210" r="5" fill="url(#prodGrad)" filter="url(#glow)" />
    <circle cx="110" cy="235" r="4" fill="url(#prodGrad)" filter="url(#glow)" />
    <circle cx="95" cy="190" r="6" fill="url(#prodGrad)" filter="url(#glow)" />
    <circle cx="215" cy="100" r="5.5" fill="url(#prodGrad)" filter="url(#glow)" />
    <circle cx="200" cy="120" r="4" fill="url(#prodGrad)" filter="url(#glow)" />
    
    <circle cx="50" cy="90" r="5" fill="url(#prodGrad)" />
    <circle cx="150" cy="300" r="6" fill="url(#prodGrad)" />
    <circle cx="260" cy="260" r="4.5" fill="url(#prodGrad)" />
    <circle cx="280" cy="170" r="5" fill="url(#prodGrad)" />

    <!-- Herbivores (Consumers A) Cyan -->
    <!-- Rabbit 1 seeking plant -->
    <circle cx="120" cy="140" r="10" fill="url(#herbGrad)" filter="url(#glow)" />
    <line x1="120" y1="140" x2="135" y2="130" stroke="#fff" stroke-width="1.5" />
    <!-- Rabbit 2 fleeing predator -->
    <circle cx="210" cy="240" r="10" fill="url(#herbGrad)" filter="url(#glow)" />
    <line x1="210" y1="240" x2="225" y2="250" stroke="#fff" stroke-width="1.5" />
    
    <circle cx="60" cy="280" r="9" fill="url(#herbGrad)" />

    <!-- Predators (Predators B) Pink/Red -->
    <!-- Wolf 1 chasing rabbit -->
    <circle cx="160" cy="210" r="13" fill="url(#predGrad)" filter="url(#glow)" />
    <line x1="160" y1="210" x2="178" y2="220" stroke="#fff" stroke-width="2" />
    
    <circle cx="250" cy="80" r="12" fill="url(#predGrad)" />

    <!-- Steering trajectory dots -->
    <g opacity="0.3" stroke="#00e5ff" stroke-width="1" stroke-dasharray="2 3">
      <path d="M 120 140 Q 155 125 150 100" fill="none" />
      <path d="M 160 210 Q 190 225 210 240" fill="none" stroke="#ff2a5f" />
    </g>

    <!-- Cycle HUD overlay -->
    <rect x="10" y="10" width="80" height="20" rx="4" fill="rgba(0,0,0,0.6)" />
    <text x="50" y="24" fill="#00e5ff" font-family="'Fira Code', monospace" font-size="9" font-weight="700" text-anchor="middle">DAY (12:00)</text>
  </g>

  <!-- Mathematical Solver & Telemetry (Right side) -->
  <g transform="translate(450, 70)">
    <text x="0" y="20" fill="#ffffff" font-family="'Inter', sans-serif" font-size="28" font-weight="900" letter-spacing="1">ECO-SYS</text>
    <text x="145" y="20" fill="#00e5ff" font-family="'Inter', sans-serif" font-size="18" font-weight="500" letter-spacing="0.5">// SIMULATOR</text>

    <!-- Lotka Volterra equations panel -->
    <g transform="translate(0, 45)">
      <rect x="0" y="0" width="270" height="150" rx="8" fill="rgba(10, 15, 28, 0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
      
      <text x="15" y="22" fill="#00e5ff" font-family="'Inter', sans-serif" font-size="10" font-weight="700" letter-spacing="0.5">LOTKA-VOLTERRA ORBIT</text>
      <line x1="15" y1="30" x2="255" y2="30" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

      <!-- Orbit Curve -->
      <g transform="translate(15, 40)" stroke-width="1.5">
        <!-- Axes -->
        <line x1="10" y1="90" x2="220" y2="90" stroke="rgba(255,255,255,0.15)" />
        <line x1="10" y1="10" x2="10" y2="90" stroke="rgba(255,255,255,0.15)" />

        <!-- Spiral Limit Cycle -->
        <path d="M 80 50 C 120 20, 160 50, 140 70 C 110 90, 70 80, 80 50" fill="none" stroke="#00e5ff" stroke-width="2.5" filter="url(#glow)" />
        
        <circle cx="80" cy="50" r="4.5" fill="#ff2a5f" />
        
        <text x="15" y="82" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="7">Prey (X)</text>
        <text x="15" y="20" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="7" transform="rotate(-90 15 20)">Predators (Y)</text>
      </g>
    </g>

    <!-- Biomass Pyramid panel -->
    <g transform="translate(0, 215)">
      <rect x="0" y="0" width="270" height="125" rx="8" fill="rgba(10, 15, 28, 0.6)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
      
      <!-- Biomass stack bars -->
      <g transform="translate(25, 20)">
        <!-- Predators Tier -->
        <rect x="75" y="10" width="70" height="16" rx="3" fill="#ff2a5f" opacity="0.85" filter="url(#glow)" />
        <text x="110" y="22" fill="#000" font-family="'Inter', sans-serif" font-size="9" font-weight="700" text-anchor="middle">Predators</text>

        <!-- Herbivores Tier -->
        <rect x="45" y="38" width="130" height="16" rx="3" fill="#00b2ff" opacity="0.85" filter="url(#glow)" />
        <text x="110" y="50" fill="#000" font-family="'Inter', sans-serif" font-size="9" font-weight="700" text-anchor="middle">Herbivores</text>

        <!-- Producers Tier -->
        <rect x="15" y="66" width="190" height="16" rx="3" fill="#10b981" opacity="0.85" filter="url(#glow)" />
        <text x="110" y="78" fill="#000" font-family="'Inter', sans-serif" font-size="9" font-weight="700" text-anchor="middle">Producers</text>
      </g>
    </g>
  </g>

  <!-- Glowing HUD borders -->
  <rect x="15" y="15" width="770" height="470" rx="12" fill="none" stroke="rgba(0, 229, 255, 0.12)" stroke-width="2" />
  
  <!-- Corner Tech Details -->
  <line x1="15" y1="35" x2="15" y2="65" stroke="#00e5ff" stroke-width="3" />
  <line x1="15" y1="35" x2="45" y2="35" stroke="#00e5ff" stroke-width="3" />

  <line x1="785" y1="465" x2="785" y2="435" stroke="#00e5ff" stroke-width="3" />
  <line x1="785" y1="465" x2="755" y2="465" stroke="#00e5ff" stroke-width="3" />
</svg>
