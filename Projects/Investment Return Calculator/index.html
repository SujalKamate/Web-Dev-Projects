<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Investment Return Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="teleBar">
    <div class="tile"><span class="tile-lbl">Total Principal</span><span class="tile-val cy" id="tilePrincipal">$0</span></div>
    <div class="tile"><span class="tile-lbl">Wealth Gain</span><span class="tile-val gr" id="tileGain">$0</span></div>
    <div class="tile"><span class="tile-lbl">Future Value</span><span class="tile-val cy" id="tileFV">$0</span></div>
    <div class="tile"><span class="tile-lbl">Absolute ROI</span><span class="tile-val gr" id="tileROI">0%</span></div>
  </header>

  <div id="deck">
    <section id="controlPanel">
      <h2 class="pnl-hd">Parameters</h2>
      <div class="ctrl">
        <label>Initial Principal <span id="valP">10000</span></label>
        <input type="range" id="slP" min="0" max="1000000" step="1000" value="10000">
      </div>
      <div class="ctrl">
        <label>Monthly Addition <span id="valPMT">500</span></label>
        <input type="range" id="slPMT" min="0" max="50000" step="100" value="500">
      </div>
      <div class="ctrl">
        <label>Annual Return <span id="valR">8</span>%</label>
        <input type="range" id="slR" min="0.1" max="30" step="0.1" value="8">
      </div>
      <div class="ctrl">
        <label>Investment Horizon <span id="valY">20</span> yr</label>
        <input type="range" id="slY" min="1" max="50" step="1" value="20">
      </div>
      <div class="ctrl">
        <label>Compounding</label>
        <select id="cmpd">
          <option value="1">Annually</option>
          <option value="2">Semi-Annually</option>
          <option value="4">Quarterly</option>
          <option value="12" selected>Monthly</option>
        </select>
      </div>
    </section>

    <section id="chartArena">
      <h2 class="pnl-hd">Growth Trajectory</h2>
      <div id="canvasWrap"><canvas id="chartCanvas"></canvas></div>
    </section>

    <section id="ledgerPanel">
      <h2 class="pnl-hd">Schedule <span id="ledgerCount"></span></h2>
      <div id="ledgerWrap">
        <table id="ledgerTable">
          <thead><tr><th>Year</th><th>Invested</th><th>Interest</th><th>Value</th></tr></thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <footer id="footBar">
    <button id="resetBtn">Reset Model</button>
  </footer>
</div>
<script src="script.js"></script>
</body>
</html>
